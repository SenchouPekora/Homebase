<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Homebase | Favorites</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" type="text/css" href="Misc/styles.css">
    <style>
        /* Isolated styling for favorites page */
        #image-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            padding: 20px;
            margin-top: 20px; /* Ensures there's some space between the title and images */
        }

        .image-box {
            margin: 10px;
            transition: transform 0.3s ease;
            width: 150px; /* Fixed width for each image box */
            height: 150px; /* Fixed height to maintain aspect ratio */
            overflow: hidden; /* Ensures no overflow of content within the box */
            border-radius: 10px; /* Rounded corners for the image boxes */
            box-shadow: 0 4px 8px rgba(0,0,0,0.5); /* Subtle shadow for depth */
        }

        .image-box img {
            width: 100%;
            height: 100%;
            object-fit: cover; /* Ensures the images cover the area of the box without distortion */
        }

        .image-box:hover {
            transform: scale(1.1); /* Scale effect to indicate interactivity on hover */
        }
    </style>
</head>
<body>
    <h1>Favorites</h1>
    <div id="image-container"></div>
    <script src="https://www.gstatic.com/firebasejs/8.2.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.2.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.2.1/firebase-firestore.js"></script>
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDKE6vm_FNpQKZoAzhV0iFYhtBgIQMhPfI",
            authDomain: "homebase-5a001.firebaseapp.com",
            projectId: "homebase-5a001",
            storageBucket: "homebase-5a001.appspot.com",
            messagingSenderId: "956333988657",
            appId: "1:956333988657:web:8c431e1b48b07776e7fcf5",
            measurementId: "G-PQ9FB5G7KT"
        };
        firebase.initializeApp(firebaseConfig);

        firebase.auth().onAuthStateChanged(function(user) {
            if (user) {
                var db = firebase.firestore();
                db.collection('users').doc(user.uid).collection('favorites').get().then(function(querySnapshot) {
                    querySnapshot.forEach(function(doc) {
                        const img = document.createElement('img');
                        img.src = `https://drive.google.com/thumbnail?id=${doc.id}&sz=w150`;
                        img.classList.add('image-box');

                        const a = document.createElement('a');
                        a.href = `viewer.html?id=${doc.id}`;

                        a.appendChild(img);
                        document.getElementById('image-container').appendChild(a);
                    });
                });
            } else {
                console.log('User not signed in');
            }
        });
    </script>
</body>
</html>
