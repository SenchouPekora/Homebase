<!DOCTYPE html>
<html>
<head>
    <title>Homebase</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" type="text/css" href="Misc/styles.css">
</head>
<body>
<div class="header">
    <h1>Homebase</h1>
    <a href="https://github.com/SenchouPekora" target="_blank">
        <img src="Misc/git.png" alt="GitHub">
    </a>
</div>
<div class="category">
    <h3>Homebase Posts</h3>
    <button id="postBtn" class="button">Create a post</button>
    <div id="postOverlay">
        <form>
            <span id="closeBtn" class="close">×</span>
            <textarea id="postText" placeholder="Write some text..."></textarea>
            <label for="imageUpload" class="custom-file-upload">Browse</label>
            <input type="file" id="imageUpload">
            <button id="submitPost" class="button">Submit Post</button>
        </form>
    </div>
    <div id="posts" class="button-row">
        <!-- Posts will be appended here -->
        </div>
        <button id="loadMorePosts" class="button">Load All Posts</button>
        <script src="https://www.gstatic.com/firebasejs/8.2.1/firebase-app.js"></script>
        <script src="https://www.gstatic.com/firebasejs/8.2.1/firebase-firestore.js"></script>
        <script src="https://www.gstatic.com/firebasejs/8.2.1/firebase-storage.js"></script>
        <script src="script.js"></script>
        <script>
            const firebaseConfig = {
                apiKey: "AIzaSyDKE6vm_FNpQKZoAzhV0iFYhtBgIQMhPfI",
                authDomain: "homebase-5a001.firebaseapp.com",
                projectId: "homebase-5a001",
                storageBucket: "homebase-5a001.appspot.com",
                messagingSenderId: "956333988657",
                appId: "1:956333988657:web:8c431e1b48b07776e7fcf5",
                measurementId: "G-PQ9FB5G7KT"
            };
            firebase.initializeApp(firebaseConfig);
    
            const db = firebase.firestore();
            const storage = firebase.storage();
    
            document.getElementById('postBtn').addEventListener('click', () => {
                const overlay = document.getElementById('postOverlay');
                overlay.style.display = 'flex';
                overlay.style.justifyContent = 'center';
                overlay.style.alignItems = 'center';
            });
    
            document.getElementById('closeBtn').addEventListener('click', () => {
                document.getElementById('postOverlay').style.display = 'none';
            });
    
            document.getElementById('submitPost').addEventListener('click', (e) => {
                e.preventDefault();
                const displayName = document.getElementById('displayName').value;
                const postText = document.getElementById('postText').value;
                const imageFile = document.getElementById('imageUpload').files[0];
    
                if (!imageFile) {
                    alert('Please select an image to upload.');
                    return;
                }
    
                const postId = db.collection('posts').doc().id;
    
                const uploadTask = storage.ref(`images/${postId}/image`).put(imageFile);
    
                uploadTask.on('state_changed', 
                (snapshot) => {
                    // progress function
                }, 
                (error) => {
                    console.log(error);
                }, 
                () => {
                    storage.ref(`images/${postId}`).child('image').getDownloadURL().then(url => {
                        db.collection('posts').doc(postId).set({
                            displayName: displayName,
                            text: postText,
                            imageUrl: url,
                            timestamp: firebase.firestore.FieldValue.serverTimestamp()
                        }).then(() => {
                            document.getElementById('postOverlay').style.display = 'none';
                            document.getElementById('displayName').value = '';
                            document.getElementById('postText').value = '';
                            document.getElementById('imageUpload').value = '';
                        }).catch((error) => {
                            console.error("Error adding document: ", error);
                        });
                    })
                });
            });
    
            db.collection('posts').orderBy('timestamp', 'desc').limit(5).onSnapshot(snapshot => {
                document.getElementById('posts').innerHTML = '';
                snapshot.forEach(doc => {
                    const post = doc.data();
                    const postElement = document.createElement('div');
                    postElement.classList.add('post');
                    postElement.innerHTML = `
                        <h2>${post.displayName}</h2>
                        <p>${post.text.substring(0, 20)}...</p>
                        <a href="post.html?id=${doc.id}">
                            <img src="${post.imageUrl}" style="width: 150px; height: auto; object-fit: cover;">
                        </a>`;
                    document.getElementById('posts').appendChild(postElement);
                });
            });
        </script>
    </div>

    <div class="category">
        <h3>The Vault</h3>
        <div class="button-row">
            <a href="gallery.html?character=BlueArchive" class="character-button">Blue Archive</a>
        </div>
    </div>
</body>
</html>
