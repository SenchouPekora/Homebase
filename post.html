<!DOCTYPE html>
<html>
<head>
    <title>Homebase</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <style>
        #postBody {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }
        #displayName, #postText, #timePosted {
            text-align: center;
        }
        #timePosted {
            color: gray;
        }
        #postImage {
            width: 200px;
            height: auto;
            object-fit: cover;
        }
        #commentForm {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 500px;
        }
        #commentDisplayName, #commentText {
            background-color: #092e9a;  /* Dark blue background */
            color: white;               /* White text color */
            border: 2px solid #1c2e65;  /* Slightly lighter blue border */
            border-radius: 5px;         /* Rounded corners */
            padding: 10px;              /* Padding inside the text box */
            font-family: 'Montserrat', sans-serif; /* Consistent font */
            box-sizing: border-box;     /* Border and padding included in width/height */
            width: calc(100% - 22px);   /* Full width accounting for padding and border */
            outline: none;              /* Removes the outline to keep style consistent */
        }
        #commentDisplayName::placeholder, #commentText::placeholder {
            color: #ccc;                /* Light gray placeholder text for better readability */
            opacity: 1;                 /* Ensures the placeholder is fully visible */
        }
        #commentText {
            min-height: 80px;
            resize: vertical;
        }
        button {
            padding: 8px 16px;
            border-radius: 5px;
            background-color: #092e9a; /* Blue color for the button */
            color: white;
            border: none;
            cursor: pointer;
        }
        button:hover {
            background-color: #073c7a; /* Darker blue on hover */
        }
        #comments {
            display: flex;
            flex-direction: column; /* Stacks children vertically */
            align-items: center;    /* Centers comments if needed */
            width: 500px;            /* Adjust width as necessary */
        }
        .comment {
            border: 1px solid #ccc;
            border-radius: 8px;
            padding: 10px;
            margin-bottom: 10px;
            position: relative;
            width: 100%; /* Full width of container */
        }
        .timestamp {
            display: block;
            color: #aaa;
        }
        .commentDisplayName {
            font-weight: bold;
            color: #092e9a; /* Matching the theme color */
        }
        .commentText {
            margin-left: 20px;
        }
    </style>
</head>
<body>
    <div id="postBody">
        <h1 id="displayName"></h1>
        <p id="postText"></p>
        <p id="timePosted"></p>
        <img id="postImage" src="" alt="Post Image">
        <p>Click image to view full-size</p>
    </div>
    <div id="commentSection">
        <form id="commentForm">
            <input type="text" id="commentDisplayName" placeholder="Display Name" maxlength="16">
            <textarea id="commentText" placeholder="Write some text..."></textarea>
            <button type="submit">Post Comment</button>
        </form>
        <div id="comments">
            <!-- Comments will be appended here -->
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.2.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.2.1/firebase-firestore.js"></script>
    <script>
        const firebaseConfig = {
            apiKey: "Your_API_Key",
            authDomain: "your-auth-domain",
            projectId: "your-project-id",
            storageBucket: "your-storage-bucket",
            messagingSenderId: "your-messaging-sender-id",
            appId: "your-app-id",
            measurementId: "your-measurement-id"
        };
        firebase.initializeApp(firebaseConfig);

        const db = firebase.firestore();

        const urlParams = new URLSearchParams(window.location.search);
        const postId = urlParams.get('id');

        db.collection('posts').doc(postId).get().then(doc => {
            if (doc.exists) {
                const post = doc.data();
                document.getElementById('displayName').textContent = post.displayName || 'Anonymous';
                document.getElementById('postText').textContent = post.text;
                document.getElementById('postImage').src = post.imageUrl;
                document.getElementById('timePosted').textContent = post.timestamp ? new Date(post.timestamp.seconds * 1000).toLocaleString() : 'Date not available';
            } else {
                console.log('No such post!');
            }
        });

        db.collection('posts').doc(postId).collection('comments').orderBy('timestamp', 'desc').onSnapshot(snapshot => {
            const commentsContainer = document.getElementById('comments');
            commentsContainer.innerHTML = '';
            snapshot.forEach(doc => {
                const comment = doc.data();
                if (comment.timestamp) {
                    const commentElement = document.createElement('div');
                    commentElement.classList.add('comment');
                    commentElement.innerHTML = `
                        <span class="timestamp">${new Date(comment.timestamp.seconds * 1000).toLocaleString()}</span>
                        <h2 class="commentDisplayName">${comment.displayName}</h2>
                        <p class="commentText">${comment.text}</p>`;
                    commentsContainer.appendChild(commentElement);
                } else {
                    console.log("Timestamp missing for comment", comment);
                }
            });
        });

        document.getElementById('commentForm').addEventListener('submit', event => {
            event.preventDefault();
            const displayName = document.getElementById('commentDisplayName').value.trim();
            const text = document.getElementById('commentText').value.trim();

            if (!displayName || !text) {
                alert('Both display name and comment must be filled out.');
                return;
            }

            db.collection('posts').doc(postId).collection('comments').add({
                displayName: displayName,
                text: text,
                timestamp: firebase.firestore.FieldValue.serverTimestamp()
            }).then(() => {
                document.getElementById('commentDisplayName').value = '';
                document.getElementById('commentText').value = '';
            }).catch(error => {
                console.error("Error posting comment: ", error);
            });
        });

        document.getElementById('postImage').addEventListener('click', event => {
            window.open(event.target.src);
        });
    </script>
</body>
</html>
